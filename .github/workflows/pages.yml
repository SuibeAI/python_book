name: Deploy Jupyter Lite to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Jupyter Lite
        run: |
          python -m pip install -U pip
          python -m pip install -U jupyterlite jupyterlite-pyodide-kernel

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Jupyter Lite
        run: |
          python -m jupyterlite build . \
            --contents books \
            --output-dir _build/jupyter-lite

      - name: Clean up checkpoint files
        run: |
          find _build/jupyter-lite -type d -name ".ipynb_checkpoints" -exec rm -rf {} + || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_build/jupyter-lite

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
